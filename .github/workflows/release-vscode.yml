name: Release VSCode Extension

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build VSIX, skip publishing and tagging"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    # Job-level env so the Open VSX step's `if` can read it (step-level env is
    # not visible in that same step's `if` condition).
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Compute version
        id: version
        run: |
          # Full version is read from apps/vscode/package.json (single source of truth).
          # Bump it in a commit before running this workflow.
          VERSION=$(node -p "require('./apps/vscode/package.json').version")
          TAG="vscode-v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null \
            || git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Bump apps/vscode/package.json before releasing."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: |
          pnpm format
          pnpm build
          pnpm lint
          pnpm test

      - name: Package VSIX
        run: pnpm package:vscode

      - name: Publish to Visual Studio Marketplace
        if: ${{ !inputs.dry-run }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd apps/vscode
          pnpm dlx @vscode/vsce publish --no-dependencies --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: ${{ !inputs.dry-run && env.OVSX_PAT != '' }}
        run: |
          VSIX=$(ls artifacts/codesetu-*.vsix | head -n1)
          pnpm dlx ovsx publish "$VSIX" --pat "$OVSX_PAT"

      - name: Configure git identity for tagging
        if: ${{ !inputs.dry-run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tag the release commit
        if: ${{ !inputs.dry-run }}
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@v2
        with:
          name: VSCode Extension ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          files: artifacts/codesetu-*.vsix
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Release summary"
            echo ""
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Tag: \`${{ steps.version.outputs.tag }}\`"
            if [ "${{ inputs.dry-run }}" = "true" ]; then
              echo "- Mode: **dry-run** (nothing published, no tag pushed)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

name: Release JetBrains Plugin

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build plugin zip and skip publishing, tagging, and GitHub Release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/jetbrains/**/*.gradle.kts', 'apps/jetbrains/gradle.properties', 'apps/jetbrains/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Compute version
        id: version
        run: |
          # Full version is read from apps/jetbrains/gradle.properties (single source of truth).
          # Bump pluginVersion in a commit before running this workflow.
          VERSION=$(grep '^pluginVersion=' apps/jetbrains/gradle.properties | cut -d= -f2)
          TAG="jetbrains-v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null \
            || git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Bump pluginVersion in apps/jetbrains/gradle.properties before releasing."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      - name: Build and verify plugin
        working-directory: apps/jetbrains
        run: ./gradlew buildPlugin verifyPlugin --no-daemon

      - name: Verify plugin zip exists
        run: |
          VSIX="apps/jetbrains/build/distributions/codesetu-jetbrains-${{ steps.version.outputs.version }}.zip"
          if [ ! -f "$VSIX" ]; then
            echo "::error::Expected plugin zip not found at $VSIX"
            ls apps/jetbrains/build/distributions/ || true
            exit 1
          fi
          echo "Built: $VSIX"

      - name: Publish to JetBrains Marketplace
        if: ${{ !inputs.dry-run }}
        working-directory: apps/jetbrains
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: ./gradlew publishPlugin --no-daemon

      - name: Configure git for tagging
        if: ${{ !inputs.dry-run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tag the release commit
        if: ${{ !inputs.dry-run }}
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@v2
        with:
          name: JetBrains Plugin ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          files: apps/jetbrains/build/distributions/codesetu-jetbrains-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Release summary"
            echo ""
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Tag: \`${{ steps.version.outputs.tag }}\`"
            if [ "${{ inputs.dry-run }}" = "true" ]; then
              echo "- Mode: **dry-run** (no publish, no tag pushed, no GitHub Release)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
